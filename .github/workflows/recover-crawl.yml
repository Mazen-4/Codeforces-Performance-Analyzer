name: Recover Crawl (merge orphaned chunks)

# One-shot recovery: a crawl run produced 20 submissions-* chunk artifacts but
# its merge job kept getting cancelled, so the ~8M-row dataset was never built
# or released. Those chunk artifacts expire 1 day after the crawl. This workflow
# downloads them from the original run by ID, ARCHIVES the raw chunks to a
# release immediately (safety net), then merges + retrains + releases the full
# dataset.
#
# Usage: Actions → "Recover Crawl" → Run workflow → enter the crawl run ID.

on:
  workflow_dispatch:
    inputs:
      source_run_id:
        description: "Run ID of the crawl whose submissions-* chunks to recover"
        required: true
        type: string
      num_chunks:
        description: "Number of chunks that crawl produced"
        required: false
        default: "20"
        type: string

env:
  PYTHONUNBUFFERED: "1"

jobs:
  recover:
    name: Archive chunks → Merge → Retrain → Release
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      actions: read   # needed to download artifacts from another run

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Download orphaned chunk artifacts from the crawl run
        uses: actions/download-artifact@v5
        with:
          pattern: submissions-*
          path: chunks/
          merge-multiple: true
          run-id: ${{ github.event.inputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List recovered chunks
        run: |
          ls -lh chunks/
          echo "CSV count: $(ls chunks/submissions_*.csv 2>/dev/null | wc -l)"
          [ "$(ls chunks/submissions_*.csv 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "ERROR: no chunk CSVs recovered — they may have expired"; exit 1; }

      # ── SAFETY NET: archive the raw chunks before anything that could fail ──
      - name: Archive raw chunks to a release (safety net)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p /tmp/raw
          tar -czf /tmp/raw/raw-chunks-run-${{ github.event.inputs.source_run_id }}.tar.gz -C chunks .
          ls -lh /tmp/raw/
          TAG="raw-crawl-${{ github.event.inputs.source_run_id }}"
          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Raw crawl chunks — run ${{ github.event.inputs.source_run_id }}" \
            --notes "Raw submissions-* chunks recovered from crawl run ${{ github.event.inputs.source_run_id }} before they expired. Unmerged." \
            --prerelease \
            /tmp/raw/raw-chunks-run-${{ github.event.inputs.source_run_id }}.tar.gz
          echo "Raw chunks archived to release: $TAG"

      - name: Download previous dataset + models (merge base)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ML/dataset ML/models
          LATEST=$(gh release list \
            --repo ${{ github.repository }} --limit 20 \
            --json tagName,isDraft \
            -q '[.[] | select(.isDraft == false) | select(.tagName | startswith("data-")) | .tagName] | .[0]' 2>/dev/null || echo "")
          if [ -n "$LATEST" ]; then
            echo "Merge base: $LATEST"
            gh release download "$LATEST" \
              --repo ${{ github.repository }} \
              --pattern "dataset-*.tar.gz" \
              --pattern "models-*.tar.gz" \
              --dir /tmp/release-assets --clobber 2>/dev/null || true
            for f in /tmp/release-assets/dataset-*.tar.gz; do
              [ -f "$f" ] && tar -xzf "$f" -C ML/dataset/
            done
            for f in /tmp/release-assets/models-*.tar.gz; do
              [ -f "$f" ] && tar -xzf "$f" -C ML/models/
            done
          else
            echo "No prior data-* release — building dataset fresh from chunks."
          fi
          echo "--- Dataset ---"; ls -lh ML/dataset/ 2>/dev/null || echo "(empty)"
          echo "--- Models ---";  ls -lh ML/models/  2>/dev/null || echo "(empty)"

      - name: Merge chunks + preprocess + retrain
        run: |
          DATA_DIR=${{ github.workspace }} \
          NUM_CHUNKS=${{ github.event.inputs.num_chunks }} \
          python scripts/merge_and_retrain.py

      - name: Package outputs
        run: |
          DATE=$(date -u +%Y%m%d)
          echo "--- Dataset files ---"; ls -lh ML/dataset/ 2>/dev/null || echo "(empty)"
          echo "--- Model files ---";  ls -lh ML/models/  2>/dev/null || echo "(empty)"
          [ "$(ls ML/dataset/*.csv 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "ERROR: No CSVs in ML/dataset/"; exit 1; }
          [ "$(ls ML/models/*.pkl 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "ERROR: No .pkl in ML/models/"; exit 1; }
          tar -czf /tmp/dataset-${DATE}.tar.gz -C ML/dataset .
          tar -czf /tmp/models-${DATE}.tar.gz  -C ML/models  .
          echo "DATE=${DATE}" >> $GITHUB_ENV
          ls -lh /tmp/dataset-${DATE}.tar.gz /tmp/models-${DATE}.tar.gz

      - name: Create GitHub Release (full merged dataset + models)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-$(date -u +%Y-%m-%d)"
          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Dataset & models (recovered crawl) — $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --notes "Merged the recovered chunks from run ${{ github.event.inputs.source_run_id }} into the dataset and retrained." \
            --prerelease \
            /tmp/dataset-${DATE}.tar.gz \
            /tmp/models-${DATE}.tar.gz
          echo "Release published: $TAG"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: recover-crawl-logs-${{ github.run_id }}
          path: |
            src/pipeline/logs/
            logs/
          retention-days: 30
