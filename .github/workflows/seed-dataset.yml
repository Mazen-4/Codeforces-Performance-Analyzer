name: Seed Initial Dataset

# Run this ONCE manually to upload your local dataset and models to GitHub Releases.
# After this, the weekly-retrain workflow will pick up from where this left off.
#
# How to use:
#   1. Tar up your local files:
#        tar -czf dataset-init.tar.gz -C ML/dataset .
#        tar -czf models-init.tar.gz  -C ML/models  .
#   2. Go to Actions → "Seed Initial Dataset" → Run workflow
#   3. Upload the two .tar.gz files when prompted
#
# OR use the gh CLI directly (easier):
#   gh release create data-init \
#     --title "Initial dataset seed" \
#     --notes "Manual seed from local machine" \
#     --prerelease \
#     dataset-init.tar.gz \
#     models-init.tar.gz

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag for the seed release (e.g. data-init)"
        required: true
        default: "data-init"
      notes:
        description: "Release notes"
        required: false
        default: "Initial dataset seed — uploaded manually"

jobs:
  seed:
    name: Create seed release placeholder
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create placeholder release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          NOTES="${{ github.event.inputs.notes }}

          ---
          Upload your dataset and model files to this release using:

            gh release upload $TAG dataset-YYYYMMDD.tar.gz models-YYYYMMDD.tar.gz

          Expected archive contents:
            dataset-*.tar.gz  →  ML/dataset/*.csv  (all 6 CSV files)
            models-*.tar.gz   →  ML/models/*.pkl   (success, attempts, rating_progression models)
          "

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Seed dataset — $TAG" \
            --notes "$NOTES" \
            --prerelease

          echo "Placeholder release '$TAG' created."
          echo "Now upload your files with:"
          echo "  gh release upload $TAG dataset-init.tar.gz models-init.tar.gz"
