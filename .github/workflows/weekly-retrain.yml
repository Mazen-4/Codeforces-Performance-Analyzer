name: Weekly Crawl & Retrain

on:
  schedule:
    - cron: "0 2 * * 0"   # Every Sunday at 02:00 UTC
  workflow_dispatch:        # Allow manual trigger from GitHub UI
    inputs:
      since_days:
        description: "Crawl submissions from the last N days"
        required: false
        default: "7"
        type: choice
        options:
          - "1"
          - "3"
          - "7"
          - "14"
          - "30"
          - "90"
      min_rating:
        description: "Minimum CF rating to include"
        required: false
        default: "900"
      max_rating:
        description: "Maximum CF rating to include"
        required: false
        default: "3500"

jobs:
  retrain:
    name: Crawl → Preprocess → Retrain → Release
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6-hour hard cap

    permissions:
      contents: write      # needed to create GitHub Releases

    env:
      DATA_DIR: ${{ github.workspace }}
      SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
      CF_MIN_RATING: ${{ github.event.inputs.min_rating || '900' }}
      CF_MAX_RATING: ${{ github.event.inputs.max_rating || '3500' }}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      # ── 1. Checkout source ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt lightgbm scikit-learn

      # ── 3. Download previous dataset + models from latest release ────────────
      # The crawler merges new submissions into 04_filtered_submissions.csv,
      # so we need the previous version to build on top of.
      - name: Download previous dataset from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ML/dataset ML/models

          LATEST=$(gh release list \
            --repo ${{ github.repository }} \
            --limit 10 \
            --json tagName,isDraft,isPrerelease \
            -q '[.[] | select(.isDraft == false) | .tagName] | .[0]' \
            2>/dev/null || echo "")

          if [ -n "$LATEST" ]; then
            echo "Downloading assets from release: $LATEST"
            gh release download "$LATEST" \
              --repo ${{ github.repository }} \
              --pattern "dataset-*.tar.gz" \
              --pattern "models-*.tar.gz" \
              --dir /tmp/release-assets \
              --clobber || echo "No matching assets — starting fresh."

            for f in /tmp/release-assets/dataset-*.tar.gz; do
              [ -f "$f" ] && tar -xzf "$f" -C ML/dataset/ && echo "Extracted $f"
            done
            for f in /tmp/release-assets/models-*.tar.gz; do
              [ -f "$f" ] && tar -xzf "$f" -C ML/models/ && echo "Extracted $f"
            done
          else
            echo "No published release found — starting fresh."
          fi

          echo "--- Dataset files ---"
          ls -lh ML/dataset/ 2>/dev/null || echo "(empty)"
          echo "--- Model files ---"
          ls -lh ML/models/ 2>/dev/null || echo "(empty)"

      # ── 4. Print job parameters ──────────────────────────────────────────────
      - name: Print parameters
        run: |
          echo "Since days:   $SINCE_DAYS"
          echo "Rating range: $CF_MIN_RATING – $CF_MAX_RATING"

      # ── 5. Run incremental crawl + preprocess + retrain ──────────────────────
      - name: Run crawl and retrain
        run: python scripts/crawl_and_retrain.py

      # ── 6. Package outputs ───────────────────────────────────────────────────
      - name: Package dataset and models
        run: |
          DATE=$(date -u +%Y%m%d)

          echo "--- Files in ML/dataset/ ---"
          ls -lh ML/dataset/ 2>/dev/null || echo "(empty)"
          echo "--- Files in ML/models/ ---"
          ls -lh ML/models/ 2>/dev/null || echo "(empty)"

          # Fail early with a clear message if outputs are missing
          [ -d ML/dataset ] && [ "$(ls ML/dataset/*.csv 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "ERROR: No CSV files found in ML/dataset/ — crawl or preprocessing failed"; exit 1; }
          [ -d ML/models ] && [ "$(ls ML/models/*.pkl 2>/dev/null | wc -l)" -gt 0 ] \
            || { echo "ERROR: No .pkl files found in ML/models/ — training failed"; exit 1; }

          # Pack all CSVs and models that exist (no hardcoded filenames)
          tar -czf /tmp/dataset-${DATE}.tar.gz -C ML/dataset .
          tar -czf /tmp/models-${DATE}.tar.gz  -C ML/models  .

          echo "DATE=${DATE}" >> $GITHUB_ENV
          echo "--- Packaged ---"
          ls -lh /tmp/dataset-${DATE}.tar.gz /tmp/models-${DATE}.tar.gz

      # ── 7. Create GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="data-$(date -u +%Y-%m-%d)"
          TITLE="Dataset & models — $(date -u '+%Y-%m-%d %H:%M UTC')"
          NOTES="Incremental crawl and retrain.
          - Submissions window: last $SINCE_DAYS days
          - Users crawled: up to $CF_CRAWL_USERS (rating $CF_MIN_RATING–$CF_MAX_RATING)
          - Triggered by: ${{ github.event_name }}
          - Run: ${{ github.run_id }}"

          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "$TITLE" \
            --notes "$NOTES" \
            --prerelease \
            /tmp/dataset-${DATE}.tar.gz \
            /tmp/models-${DATE}.tar.gz

          echo "Release published: $TAG"

      # ── 8. Upload logs (always, even on failure) ──────────────────────────────
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: retrain-logs-${{ github.run_id }}
          path: |
            src/pipeline/logs/
            logs/
          retention-days: 30
