[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20", "nodePackages.npm"]

[phases.install]
cmds = ["bash scripts/setup_render.sh"]

[start]
# Fetch the latest release models fresh on every deploy, then start the server.
# (The install phase is cached, so it can't be relied on to pull new models.)
cmd = "bash scripts/start.sh"

[variables]
NIXPACKS_NODE_VERSION = "20"
